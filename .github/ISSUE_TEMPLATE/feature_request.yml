name: Feature Request
description: Suggest an enhancement or new capability for the Data Collector framework.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check the
        [roadmap](docs/50.%20roadmap.md) to see if this is already planned.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which framework component does this relate to?
      options:
        - Database / ORM
        - Settings / Configuration
        - Logging
        - Request (HTTP client)
        - Scraping (BaseScraper / ThreadedScraper)
        - Proxy
        - Enums / Codebooks
        - fun_watch decorator
        - Orchestration / Manager
        - Deploy CLI
        - Documentation
        - New component
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: >
        Describe the problem this feature would solve.
        Use the format "When I ..., I need ... so that ...".
      placeholder: "When I ..., I need ... so that ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the solution you would like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you have considered.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information, mockups, or references.
    validations:
      required: false
